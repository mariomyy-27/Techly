<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>Order Now - TechLy</title>
    <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family:  sans-serif;
            background-color: #f4f1ec; 
            color: #1a1a2e;
            line-height: 1.6;
        }

        
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
           
        }

        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #f5a623; 
            text-decoration: none;
        }

        .logo span { color: white; }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .nav-links a:hover { color: #f5a623; }

        
        .order-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            min-height: 80vh;
        }

        .order-box {
            background: white;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid #f5a623; 
        }

        .order-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a1a2e;
            font-size: 2rem;
        }

        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        input:focus {
            border-color: #f5a623;
        }

        
        .payment-methods {
            margin: 20px 0;
            padding: 15px;
            background-color: #fdfaf5;
            border-radius: 10px;
        }

        .payment-methods p {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .radio-group input {
            width: auto;
            margin-right: 10px;
        }

        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: #f5a623;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #1a1a2e;
        }

        
      
        
         footer { background-color: #1a1a2e; color: white; text-align: center; padding: 40px; margin-top: 40px; }
    .footer-links a { color: #f5a623; text-decoration: none; margin: 0 10px; }


    </style>
</head>
<body>

    <header>
        <a href="Home.html" class="logo">Tech<span>Ly</span></a>
        <nav class="nav-links">
           
      <a href="Home.html">Home</a>
      <a href="Phones.html">Phones</a>
      <a href="tablets.html">Tablets</a>
      <a href="laptops.html">Laptops</a>
      <a href="Signin.html">Sign In</a>
        </nav>
    </header>

    <div class="order-container">
        <div class="order-box">
            <h2>Complete Your Order</h2>
            <form id="orderForm">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="e.g. John" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="e.g. Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Shipping Address</label>
                    <input type="text" placeholder="Street Name, Building No." required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" placeholder="Cairo" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+201234567890" required>
                    </div>
                </div>

                <div class="payment-methods">
                    <p>Payment Method</p>
                    <div class="radio-group">
                        <label><input type="radio" name="payment" value="cod" checked> Cash On Delivery</label>
                        <label><input type="radio" name="payment" value="card"> Credit / Debit Card</label>
                        <label><input type="radio" name="payment" value="instapay"> InstaPay / Wallet</label>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Confirm Order</button>
            </form>
        </div>
    </div>

    <footer>
       <p>©<b>TechLy</b> all rights reserved 2026</p>
    <div class="footer-links">
      <a href="Aboutus.html">About Us</a>
      <a href="Contactus.html">Contact Us</a>
    </div>
    </footer>

    <script>
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you! Your order has been placed successfully. 🚀");
            window.location.href ="Home.html"; 
        });
    </script>

</body>
</html>
